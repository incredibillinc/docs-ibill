kind: pipeline
type: docker
name: docs-ci

trigger:
  event:
    - push
    - pull_request
    - custom

steps:
  - name: test-mkdocs-build
    image: python:3.11
    commands:
      - pip install mkdocs mkdocs-material
      - mkdocs build --strict

  - name: codespell
    image: python:3.11
    commands:
      - pip install codespell
      - codespell docs/ --ignore-words-list="nd,te"

  - name: links-check
    image: lycheeverse/lychee
    commands:
      - lychee --verbose --no-progress --timeout 20 --max-concurrency 4 --accept 200,403 'docs/**/*.md'

  - name: notify n8n
    image: curlimages/curl
    when:
      status:
        - success
        - failure
    commands:
      - |
        # Send the webhook with properly formatted JSON
        curl -X POST "https://n8n.ispnet.work/webhook/drone-build-complete" \
        -H "Content-Type: application/json" \
        -d '{
          "status": "${DRONE_BUILD_STATUS}",
          "repo_name": "${DRONE_REPO_NAME}",
          "commit": "${DRONE_COMMIT}",
          "branch": "${DRONE_BRANCH}",
          "build_url": "${DRONE_BUILD_LINK}"
        }'