kind: pipeline
type: docker
name: docs-ci

trigger:
  event:
    - push
    - pull_request
    - custom

steps:
  - name: test-mkdocs-build
    image: python:3.11
    commands:
      - pip install mkdocs mkdocs-material
      - mkdocs build --strict

  - name: codespell
    image: python:3.11
    commands:
      - pip install codespell
      - codespell docs/ --ignore-words-list="nd,te"

  - name: links-check
    image: lycheeverse/lychee
    commands:
      - lychee --verbose --no-progress --timeout 20 --max-concurrency 4 'docs/**/*.md'

  - name: notify n8n
    image: curlimages/curl
    when:
      status:
        - success
        - failure
    commands:
      - |
        # First create a dynamic variable using the actual status
        CURRENT_STATUS=$DRONE_BUILD_STATUS
        echo "Current build status: $CURRENT_STATUS"
        
        # Create the JSON payload with the actual status
        JSON_PAYLOAD=$(cat << EOF
        {
          "repo": "${DRONE_REPO}",
          "branch": "${DRONE_BRANCH}",
          "status": "${CURRENT_STATUS}",
          "buildUrl": "${DRONE_BUILD_LINK}"
        }
        EOF
        )
        
        # For debugging to verify the payload
        echo "Sending payload: $JSON_PAYLOAD"

        # Send the webhook with properly formatted JSON
        curl -X POST "https://n8n.ispnet.work/webhook/drone-build-complete" \
        -H "Content-Type: application/json" \
        -d "$JSON_PAYLOAD"