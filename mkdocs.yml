theme:
  name: material
  logo: assets/logo.png  # Place your logo in docs/assets/logo.png
  favicon: assets/favicon.ico  # Place your favicon in docs/assets/favicon.ico
  palette:
    - scheme: default
      primary: blue  # Use a built-in color name, will be overridden by CSS
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    # Removed navigation.tabs and navigation.top for sidebar navigation
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - toc.integrate
    - header.autohide
    - announce.dismiss
extra_css:
  - styles/extra.css
plugins:
  - search
